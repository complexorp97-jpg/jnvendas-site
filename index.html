<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JN VENDAS</title>

<style>
  :root{
    --neon:#b56bff; --neon2:#ff4dff;
    --bg1:#140022; --bg2:#2a0047; --bg3:#4d0099;
  }
  *{box-sizing:border-box}
  body{ margin:0; font-family:Arial; background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3)); color:white; overflow-x:hidden; }

  /* chuvisco roxo */
  .drip{
    position:fixed; top:-12vh; width:3px; height:14px;
    background:linear-gradient(180deg, rgba(181,107,255,0), rgba(181,107,255,.95));
    border-radius:999px; opacity:.85; pointer-events:none; z-index:1;
    animation:fall linear forwards;
    filter:drop-shadow(0 0 10px rgba(181,107,255,.35));
  }
  @keyframes fall{ to{ transform:translateY(120vh); } }

  .topbar{
    position:sticky; top:0; z-index:10;
    padding:12px 15px; display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:rgba(0,0,0,.18); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(181,107,255,.45);
  }
  .logo{ font-weight:1000; font-size:14px; letter-spacing:.6px; text-shadow:0 0 10px rgba(181,107,255,.8); white-space:nowrap; }
  .actions{ display:flex; gap:10px; align-items:center; }
  .pill,.iconBtn{
    height:32px; border-radius:10px;
    border:1px solid rgba(181,107,255,.55);
    background:rgba(255,255,255,.08);
    color:#fff; font-weight:1000; cursor:pointer;
  }
  .pill{ padding:0 10px; }
  .iconBtn{ width:32px; display:flex; align-items:center; justify-content:center; text-decoration:none; }

  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:14px; position:relative; z-index:2; }
  @media(max-width:520px){ .grid{grid-template-columns:1fr;} }

  .card{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(181,107,255,.35);
    border-radius:18px; padding:10px; text-align:center;
    box-shadow:0 0 20px rgba(181,107,255,.12);
  }
  .thumb{
    height:120px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-weight:1000; background:white; color:#2a0047;
    box-shadow:0 0 16px rgba(181,107,255,.35);
    letter-spacing:.7px;
  }
  .card h3{ margin:10px 0 6px; font-size:13px; text-transform:uppercase; }
  .old{ text-decoration:line-through; opacity:.65; font-weight:900; }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .new{
    font-size:18px; font-weight:1000; color:var(--neon);
    text-shadow:0 0 10px rgba(181,107,255,.9),0 0 18px rgba(255,77,255,.55);
    animation:blink 1s infinite;
  }
  .btn{
    margin-top:10px; width:100%; padding:8px; border-radius:10px;
    border:1px solid rgba(181,107,255,.55); background:rgba(255,255,255,.08);
    color:white; font-weight:1000; cursor:pointer;
  }

  /* Modal base */
  .modalBg{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; z-index:99; }
  .modalBg.show{ display:block; }
  .modal{
    width:min(520px, calc(100vw - 26px));
    position:fixed; left:50%; top:50%;
    transform:translate(-50%,-50%);
    border-radius:18px;
    border:1px solid rgba(181,107,255,.45);
    background:rgba(20,0,34,.92);
    backdrop-filter: blur(10px);
    padding:12px;
  }
  .modalHead{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .closeBtn{
    width:40px;height:40px;border-radius:12px;border:1px solid rgba(181,107,255,.45);
    background:rgba(255,255,255,.08);color:#fff;font-weight:1000;cursor:pointer;
  }
  .input{
    width:100%; height:44px; border-radius:14px; border:1px solid rgba(181,107,255,.45);
    background:rgba(255,255,255,.08); color:#fff; padding:0 12px; outline:none; font-weight:1000;
  }
  .hint{ margin-top:8px; color:rgba(255,255,255,.75); font-size:12px; font-weight:800; }

  /* Drawer 📥 */
  .drawer{
    position:fixed; top:0; right:-420px; height:100vh; width:min(420px, 92vw);
    background:rgba(20,0,34,.96);
    border-left:1px solid rgba(181,107,255,.35);
    z-index:120;
    transition:right .25s ease;
    box-shadow:-20px 0 50px rgba(0,0,0,.55);
    display:flex; flex-direction:column;
  }
  .drawer.open{ right:0; }
  .drawerHead{
    padding:12px 14px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(181,107,255,.25);
  }
  .drawerBody{ padding:14px; overflow:auto; }
  .buyCard{
    border:1px solid rgba(181,107,255,.28);
    background:rgba(255,255,255,.05);
    border-radius:16px;
    padding:12px;
    margin-bottom:12px;
  }
  .buyCard h4{ margin:0 0 8px; }
  .reveal{ width:100%; padding:10px; border-radius:12px; border:1px solid rgba(181,107,255,.55); background:rgba(255,255,255,.08); color:#fff; font-weight:1000; cursor:pointer; }
  .reveal[disabled]{ opacity:.45; cursor:not-allowed; }
  .codeBox{
    display:none;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    border:1px solid rgba(181,107,255,.25);
    background:rgba(0,0,0,.25);
    font-family:monospace;
    font-size:12px;
    white-space:pre-wrap;
    word-break:break-word;
  }

  /* WhatsApp icon (logo “original” em SVG) */
  .waIcon{ width:18px; height:18px; display:block; }

  .footerNote{
    text-align:center;
    opacity:.55;
    font-size:12px;
    margin: 8px 0 20px;
    position:relative; z-index:2;
  }
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🇧🇷 JN VENDAS</div>
  <div class="actions">

    <!-- WhatsApp -->
    <a class="iconBtn" id="waBtn" title="WhatsApp" aria-label="WhatsApp" target="_blank" rel="noopener">
      <svg class="waIcon" viewBox="0 0 32 32" aria-hidden="true">
        <path fill="#25D366" d="M19.1 17.4c-.3-.2-1.7-.8-2-.9-.3-.1-.5-.2-.7.2-.2.3-.8.9-1 1.1-.2.2-.4.2-.7.1-.3-.2-1.2-.4-2.3-1.4-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2.1-.4 0-.6-.1-.2-.7-1.7-1-2.3-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4-.3.3-1.2 1.1-1.2 2.8s1.2 3.2 1.4 3.4c.2.2 2.4 3.7 5.9 5.2.8.3 1.4.5 1.9.6.8.2 1.5.2 2.1.1.6-.1 1.7-.7 1.9-1.4.2-.7.2-1.3.1-1.4-.1-.2-.3-.2-.6-.4z"/>
        <path fill="#25D366" d="M27.4 4.6C24.6 1.8 20.9.3 17 .3 9 .3 2.6 6.7 2.6 14.7c0 2.5.7 5 2.1 7.1L3.3 30l8.4-1.3c2 .9 4.2 1.4 6.4 1.4 8 0 14.4-6.5 14.4-14.4 0-3.9-1.5-7.6-4.2-10.3zm-10.4 23c-2.1 0-4.1-.5-5.9-1.5l-.4-.2-5  .8.8-4.9-.2-.5c-1.2-1.9-1.8-4.1-1.8-6.3 0-6.6 5.4-12 12-12 3.2 0 6.2 1.2 8.5 3.5 2.3 2.3 3.5 5.3 3.5 8.5 0 6.6-5.4 12.1-12 12.1z"/>
      </svg>
    </a>

    <!-- 📥 Compras -->
    <button class="iconBtn" onclick="openDrawer()">📥</button>

    <!-- Carrinho -->
    <button class="iconBtn" onclick="openCart()">🛒</button>
  </div>
</div>

<div id="list" class="grid"></div>
<div class="footerNote">Toque no 📥 para ver compras após a entrega por link.</div>

<!-- CARRINHO -->
<div class="modalBg" id="cartBg" onclick="closeCart()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modalHead">
      <b>🛒 Carrinho</b>
      <button class="closeBtn" onclick="closeCart()">✕</button>
    </div>

    <div id="cartList"></div>

    <div style="margin-top:10px">
      <input class="input" id="buyerEmail" placeholder="Seu e-mail (pra receber o link)" inputmode="email">
      <div class="hint">Após aprovar pagamento, você recebe o link de entrega no e-mail.</div>
    </div>

    <button class="btn" style="margin-top:12px" onclick="pagar()">
      PIX (link Mercado Pago)
    </button>

    <div class="hint" id="status"></div>
  </div>
</div>

<!-- DRAWER COMPRAS -->
<div class="drawer" id="drawer">
  <div class="drawerHead">
    <b>📥 Minhas compras</b>
    <button class="closeBtn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawerBody" id="drawerBody"></div>
</div>

<script>
  // ========= CONFIG =========
  const API_BASE = "https://jnvendas-bot.onrender.com";

  // WhatsApp link (troque pelo seu)
  const WHATSAPP_LINK = "https://chat.whatsapp.com/H1Q6IzfX11kC68TYXcr2Co?mode=gi_t";
  document.getElementById("waBtn").href = WHATSAPP_LINK;

  const produtos = [
    { id:"BRP1", nome:"CONTAS BRP1", old:20, price:12 },
    { id:"BRP2", nome:"CONTAS BRP2", old:20, price:12 },
    { id:"BRP3", nome:"CONTAS BRP3", old:20, price:12 },
    { id:"BRP4", nome:"CONTAS BRP4", old:20, price:12 },
    { id:"BRP5", nome:"CONTAS BRP5", old:20, price:12 }
  ];

  // carrinho simples (1 item por vez)
  let cart = []; // [{id, qty}]
  const fmt = (n)=> n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  // chuvisco
  function drip(){
    const d=document.createElement("div");
    d.className="drip";
    d.style.left=Math.random()*100+"vw";
    d.style.animationDuration=(Math.random()*3+2.8)+"s";
    d.style.width=(Math.random()*2+2)+"px";
    d.style.height=(Math.random()*14+8)+"px";
    d.style.opacity=(Math.random()*.35+.5);
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 6500);
  }
  setInterval(drip, 120);

  function render(){
    document.getElementById("list").innerHTML = produtos.map(p=>`
      <div class="card">
        <div class="thumb">ROLEPLAY</div>
        <h3>${p.nome}</h3>
        <div class="old">${fmt(p.old)}</div>
        <div class="new">${fmt(p.price)}</div>
        <button class="btn" onclick="addToCart('${p.id}',1)">🛒 Comprar</button>
      </div>
    `).join("");
  }

  function openCart(){ document.getElementById("cartBg").classList.add("show"); renderCart(); }
  function closeCart(){ document.getElementById("cartBg").classList.remove("show"); document.getElementById("status").innerText=""; }

  function addToCart(id,q){
    const it = cart.find(x=>x.id===id);
    if(it) it.qty += q;
    else cart.push({id, qty:q});
    openCart();
  }

  function renderCart(){
    const box=document.getElementById("cartList");
    if(cart.length===0){
      box.innerHTML = `<div class="hint">Carrinho vazio.</div>`;
      return;
    }
    let total=0;
    box.innerHTML = cart.map(ci=>{
      const p = produtos.find(x=>x.id===ci.id);
      const sub = p.price * ci.qty;
      total += sub;
      return `
        <div class="cartItem" style="border:1px solid rgba(181,107,255,.25);border-radius:14px;padding:10px;background:rgba(255,255,255,.06);margin-bottom:10px">
          <div><b>${p.nome}</b><br><small>${ci.qty}x • Subtotal: ${fmt(sub)}</small></div>
          <div style="display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
            <button class="miniBtn" style="width:36px;height:36px;border-radius:12px;border:1px solid rgba(181,107,255,.45);background:rgba(255,255,255,.08);color:#fff;font-weight:1000;cursor:pointer" onclick="qtyMinus('${ci.id}')">−</button>
            <button class="miniBtn" style="width:36px;height:36px;border-radius:12px;border:1px solid rgba(181,107,255,.45);background:rgba(255,255,255,.08);color:#fff;font-weight:1000;cursor:pointer" onclick="qtyPlus('${ci.id}')">+</button>
            <button class="removeBtn" style="height:36px;padding:0 10px;border-radius:12px;border:1px solid rgba(255,77,255,.45);background:rgba(255,77,255,.12);color:#fff;font-weight:1000;cursor:pointer" onclick="removeItem('${ci.id}')">Remover</button>
          </div>
        </div>
      `;
    }).join("");
    box.innerHTML += `<div class="hint" style="margin-top:8px"><b>Total:</b> ${fmt(total)}</div>`;
  }

  function qtyMinus(id){
    const it = cart.find(x=>x.id===id);
    if(!it) return;
    it.qty -= 1;
    if(it.qty<=0) cart = cart.filter(x=>x.id!==id);
    renderCart();
  }
  function qtyPlus(id){
    const it = cart.find(x=>x.id===id);
    if(!it) return;
    it.qty += 1;
    renderCart();
  }
  function removeItem(id){
    cart = cart.filter(x=>x.id!==id);
    renderCart();
  }

  // PAGAR: aqui você chama seu bot pra criar pagamento (init_point)
  async function pagar(){
    const email = (document.getElementById("buyerEmail").value||"").trim();
    if(!email || !email.includes("@")){
      document.getElementById("status").innerText = "Coloque um e-mail válido.";
      return;
    }
    if(cart.length===0){
      document.getElementById("status").innerText = "Carrinho vazio.";
      return;
    }

    const items = cart.map(ci=>{
      const p = produtos.find(x=>x.id===ci.id);
      return { id:p.id, title:p.nome, quantity:ci.qty, unit_price:p.price };
    });

    document.getElementById("status").innerText = "Criando pagamento...";
    try{
      const r = await fetch(API_BASE + "/api/mp/create", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          buyerEmail: email,
          items,
          siteBase: location.origin + location.pathname.replace(/\/[^\/]*$/, "/")
        })
      });
      const data = await r.json();
      if(!r.ok) throw new Error(data?.error || "Erro");
      // abre checkout do MP
      window.location.href = data.init_point;
    }catch(e){
      document.getElementById("status").innerText = "Erro de conexão com o bot.";
    }
  }

  // ========= 📥 COMPRAS =========
  function openDrawer(){
    document.getElementById("drawer").classList.add("open");
    loadPurchases();
  }
  function closeDrawer(){
    document.getElementById("drawer").classList.remove("open");
  }

  function getToken(){
    const t = localStorage.getItem("jn_token");
    return (t && t.length>10) ? t : null;
  }

  async function loadPurchases(){
    const wrap = document.getElementById("drawerBody");
    wrap.innerHTML = "";

    const token = getToken();

    // Se não tem token, não mostra nada (do jeito que você pediu)
    if(!token){
      wrap.innerHTML = `<div class="hint">Nenhuma compra encontrada.</div>`;
      return;
    }

    try{
      const r = await fetch(API_BASE + "/api/purchases?token=" + encodeURIComponent(token));
      const data = await r.json();
      if(!r.ok) throw new Error(data?.error || "Falha");

      // monta painel BRP1..5
      const boughtMap = new Map((data.purchases||[]).map(p=>[p.productId, p]));
      produtos.forEach(p=>{
        const got = boughtMap.get(p.id);
        const div = document.createElement("div");
        div.className = "buyCard";
        div.innerHTML = `
          <h4>${p.nome}</h4>
          <button class="reveal" ${got ? "" : "disabled"}>${got ? "Ver produto 📌" : "Bloqueado 🔒"}</button>
          <div class="codeBox"></div>
        `;
        const btn = div.querySelector(".reveal");
        const box = div.querySelector(".codeBox");

        if(got){
          btn.onclick = ()=>{
            box.style.display = (box.style.display==="block" ? "none" : "block");
            box.textContent = "CÓDIGO: " + (got.code || "SEM-CODIGO");
          };
        }
        wrap.appendChild(div);
      });
    }catch(e){
      wrap.innerHTML = `<div class="hint">Erro ao carregar compras.</div>`;
    }
  }

  render();
</script>
</body>
</html>
