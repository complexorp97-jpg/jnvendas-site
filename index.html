<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JN VENDAS</title>

<style>
:root{
  --neon:#b56bff;
  --bg1:#140022;
  --bg2:#2a0047;
  --bg3:#4d0099;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  color:white;
  overflow-x:hidden;
}

/* NEVE */
.snow{
  position:fixed;
  top:-30px;
  font-size:18px;
  pointer-events:none;
  animation:fall linear forwards;
  z-index:1;
  text-shadow:0 0 10px var(--neon);
}
@keyframes fall{
  to{ transform:translateY(120vh);}
}

.topbar{
  position:sticky;
  top:0;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.3);
  border-bottom:1px solid var(--neon);
}

.logo{
  font-weight:1000;
  text-shadow:0 0 10px var(--neon);
}

.iconBtn{
  width:32px;height:32px;
  border-radius:10px;
  border:1px solid var(--neon);
  background:rgba(255,255,255,.1);
  color:white;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  padding:14px;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(255,255,255,.05);
  border:1px solid var(--neon);
  border-radius:18px;
  padding:10px;
  text-align:center;
}

.thumb{
  height:120px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:1000;
  background:white;
  color:#2a0047;
}

.old{
  text-decoration:line-through;
  opacity:.6;
}

.new{
  font-size:18px;
  font-weight:1000;
  color:var(--neon);
  text-shadow:0 0 10px var(--neon);
}

.rating{
  margin-top:8px;
  font-size:12px;
  font-weight:1000;
}

.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px #25D366;
  cursor:pointer;
  z-index:100;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🇧🇷 JN VENDAS</div>
  <div style="display:flex;gap:10px;">
    <button class="iconBtn">🔍</button>
    <button class="iconBtn">🛒</button>
  </div>
</div>

<div id="list" class="grid"></div>

<div class="whats" onclick="openWhats()">
  💬
</div>

<script>

/* NEVE ROXA */
function createSnow(){
  const s=document.createElement("div");
  s.className="snow";
  s.innerText="💜";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*4+4)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),8000);
}
setInterval(createSnow,250);

/* PRODUTOS */
let produtos=[
  {nome:"CONTAS BRP1",old:20,price:12},
  {nome:"CONTAS BRP2",old:20,price:12},
  {nome:"CONTAS BRP3",old:20,price:12},
  {nome:"CONTAS BRP4",old:20,price:12},
  {nome:"CONTAS BRP5",old:20,price:12}
];

function fmt(n){
  return n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function render(){
  document.getElementById("list").innerHTML =
  produtos.map(p=>`
    <div class="card">
      <div class="thumb">ROLEPLAY</div>
      <h3>${p.nome}</h3>
      <div class="old">${fmt(p.old)}</div>
      <div class="new">${fmt(p.price)}</div>
      <div class="rating">☆☆☆☆☆ • 0 avaliações</div>
    </div>
  `).join("");
}

function openWhats(){
  window.open("https://chat.whatsapp.com/H1Q6IzfX11kC68TYXcr2Co?mode=gi_t","_blank");
}

render();

</script>

</body>
</html>
