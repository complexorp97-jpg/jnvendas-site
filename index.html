<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JN VENDAS</title>

<style>
:root{ --neon:#b56bff; --bg1:#140022; --bg2:#2a0047; --bg3:#4d0099; }

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  color:white;
  overflow-x:hidden;
}

/* ❄ NEVE ROXA */
.snow{
  position:fixed;
  top:-20px;
  font-size:18px;
  pointer-events:none;
  animation:fall linear forwards;
  color:var(--neon);
  text-shadow:0 0 12px var(--neon);
}
@keyframes fall{ to{ transform:translateY(120vh);} }

.topbar{
  position:sticky;
  top:0;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.25);
}

.logo{
  font-weight:1000;
  font-size:14px;
  text-shadow:0 0 10px var(--neon);
}

.actions{ display:flex; gap:10px; }

.iconBtn{
  width:32px;
  height:32px;
  border-radius:10px;
  border:1px solid var(--neon);
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  padding:14px;
}

.card{
  border:1px solid var(--neon);
  border-radius:16px;
  padding:10px;
  text-align:center;
}

.thumb{
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:1000;
  background:white;
  color:#2a0047;
  border-radius:12px;
}

.new{
  color:var(--neon);
  font-weight:1000;
  font-size:18px;
}

.btn{
  margin-top:10px;
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid var(--neon);
  background:rgba(255,255,255,.08);
  color:white;
  cursor:pointer;
}

.cardRating{
  margin-top:8px;
  font-size:12px;
  opacity:.9;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🇧🇷 JN VENDAS</div>
  <div class="actions">

    <!-- WhatsApp -->
    <button class="iconBtn"
      onclick="window.open('https://chat.whatsapp.com/H1Q6IzfX11kC68TYXcr2Co?mode=gi_t','_blank')">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#25D366" viewBox="0 0 24 24">
        <path d="M12.04 2C6.58 2 2.15 6.43 2.15 11.89c0 1.96.57 3.78 1.56 5.32L2 22l4.92-1.65c1.48.81 3.18 1.27 4.98 1.27 5.46 0 9.89-4.43 9.89-9.89C21.79 6.43 17.36 2 12.04 2z"/>
      </svg>
    </button>

  </div>
</div>

<div id="list" class="grid"></div>

<script>

/* ❄ NEVE */
function createSnow(){
  const s=document.createElement("div");
  s.className="snow";
  s.innerText="❄";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*4+4)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),8000);
}
setInterval(createSnow,250);

/* PRODUTOS */
const produtos=[
{id:"1",nome:"CONTAS BRP1",price:12},
{id:"2",nome:"CONTAS BRP2",price:12},
{id:"3",nome:"CONTAS BRP3",price:12},
{id:"4",nome:"CONTAS BRP4",price:12},
{id:"5",nome:"CONTAS BRP5",price:12}
];

/* AVALIAÇÃO LOCAL */
const REV_KEY="reviews";

function getReviews(){
  return JSON.parse(localStorage.getItem(REV_KEY)||"[]");
}

function stats(id){
  const r=getReviews().filter(x=>x.id===id);
  const c=r.length;
  const avg=c? r.reduce((s,a)=>s+a.stars,0)/c:0;
  return {c,avg};
}

function render(){
  document.getElementById("list").innerHTML=
  produtos.map(p=>{
    const st=stats(p.id);
    return `
    <div class="card">
      <div class="thumb">ROLEPLAY</div>
      <h3>${p.nome}</h3>
      <div class="new">R$ ${p.price}</div>
      <div class="cardRating">
        ⭐ ${st.avg.toFixed(1)} • ${st.c} avaliações
      </div>
      <button class="btn" onclick="buy('${p.id}')">🔷 Comprar</button>
    </div>
    `;
  }).join("");
}

function buy(id){
  alert("Pagamento confirmado ✅");
  rate(id);
}

function rate(id){
  const stars=prompt("De 1 a 5 estrelas:");
  if(!stars) return;
  const all=getReviews();
  all.push({id,stars:Number(stars)});
  localStorage.setItem(REV_KEY,JSON.stringify(all));
  render();
}

render();
</script>

</body>
</html>
