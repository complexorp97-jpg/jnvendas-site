<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN VENDAS</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#120018,#2a0040);
color:#fff;
text-align:center;
}

header{
padding:20px;
font-size:22px;
font-weight:bold;
background:#1a0028;
box-shadow:0 0 20px #6a00ff;
}

.produto{
background:#1e0030;
margin:20px auto;
padding:20px;
width:90%;
max-width:400px;
border-radius:12px;
box-shadow:0 0 15px #6a00ff;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#6a00ff;
color:#fff;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#8c33ff;
}

#msg{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>🇧🇷 JN VENDAS</header>

<div class="produto">
<h2>CONTA BRP 1 🎮</h2>
<p>10HRS COM AUTORIZAÇÃO ⏰<br>E DISCORD 💬</p>
<p><b>R$ 12,00 via PIX 💜</b></p>
<input type="email" id="email" placeholder="Seu email" required><br>
<button onclick="comprar('BRP1')">Comprar</button>
</div>

<div id="msg"></div>

<script>
async function comprar(produto){

let email = document.getElementById("email").value;

if(!email){
alert("Digite seu email!");
return;
}

document.getElementById("msg").innerHTML="⏳ Processando pagamento...";

try{

let res = await fetch("https://jnvendas-bot.onrender.com/pagamento-aprovado",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
produto:produto,
compradorEmail:email
})
});

let data = await res.json();

if(data.sucesso){
document.getElementById("msg").innerHTML="✅ Pagamento aprovado! Conta enviada para seu email 🔥";
}else{
document.getElementById("msg").innerHTML="❌ Erro: "+data.erro;
}

}catch(e){
document.getElementById("msg").innerHTML="❌ Erro de conexão com o servidor.";
}

}
</script>

</body>
</html>
