<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrega - JN VENDAS</title>
  <style>
    body{
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family:Arial; color:#fff;
      background:linear-gradient(180deg,#140022,#2a0047,#4d0099);
      padding:18px;
    }
    .card{
      width:min(520px,96vw);
      background:rgba(0,0,0,.22);
      border:1px solid rgba(181,107,255,.35);
      border-radius:18px;
      padding:16px;
      text-align:center;
    }
    .btn{
      margin-top:12px; width:100%;
      padding:12px; border-radius:14px;
      border:1px solid rgba(181,107,255,.65);
      background:rgba(181,107,255,.18);
      color:#fff; font-weight:900; cursor:pointer;
    }
    p{opacity:.9}
  </style>
</head>
<body>
  <div class="card">
    <h2>✅ Entrega liberada</h2>
    <p>Seu token foi salvo. Agora abra o site e toque no 📥 para ver seu código.</p>
    <button class="btn" id="go">IR PRO SITE</button>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const token = qs.get("token");
    if(token && token.length > 10){
      localStorage.setItem("jn_token", token);
    }
    document.getElementById("go").onclick = ()=> location.href = "./index.html";
    setTimeout(()=> document.getElementById("go").click(), 1600);
  </script>
</body>
</html>
